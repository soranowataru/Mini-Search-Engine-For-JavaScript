<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Search Engine</title>

<style>

body{
    font-family:sans-serif;
    margin:20px;
}

#results{

}

.site{
    border-bottom:1px solid #ccc;
    padding:15px 0;
}

.site a{

    text-decoration:none;
}

.desc{

}

.engine{

<body>

<h1>Mini Search Engine</h1>

<input
    type="text"
    id="searchBox"

<button id="searchButton">
Search
</button>

<div id="results"></div>

<script src="search.js"></script>

</html>
